[package]
authors = ["Jarkko Sakkinen <jarkko.sakkinen@iki.fi>"]
description = "Sandbox for coding agents with parametrized state"
edition = "2024"
license = "LGPL-2.1-or-later"
homepage = "https://github.com/jarkkojs/landstrip"
repository = "https://github.com/jarkkojs/landstrip"
name = "landstrip"
readme = "README.md"
rust-version = "1.85"
version = "0.6.3"

[dependencies]
argh = "0.1.19"
dirs = "6.0.0"
env_logger = "0.11.10"
landlock = "0.4"
libc = "0.2"
libseccomp = "0.4"
log = "0.4.30"
nix = { version = "0.30", features = ["fs", "poll", "process", "socket", "uio"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
strum = "0.27"
strum_macros = "0.27"
thiserror = "2.0.18"
