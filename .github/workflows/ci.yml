name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all


  extensions:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [pi-landstrip, opencode-landstrip]
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: |
          tarball="$(npm pack ../.. --silent)"
          npm install --package-lock=false --ignore-scripts --no-save "./${tarball}"
          rm -f "${tarball}"

      - name: Format check
        run: npm run ci:fmt

      - name: Lint
        run: npm run ci:lint

      - name: Type check
        run: npm run ci:check

      - name: Test
        run: npm run ci:test
