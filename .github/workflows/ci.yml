name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all

  linux-arm64:
    name: Test Linux arm64 package
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.1
          targets: aarch64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build musl binary
        run: cargo build --release --locked --target aarch64-unknown-linux-musl

      - name: Test npm wrapper
        run: |
          mkdir -p npm/linux-arm64/bin
          cp target/aarch64-unknown-linux-musl/release/landstrip npm/linux-arm64/bin/landstrip
          chmod 755 npm/linux-arm64/bin/landstrip
          smoke_dir="$RUNNER_TEMP/landstrip-smoke"
          npm install --prefix "$smoke_dir" --package-lock=false --ignore-scripts --no-save "$GITHUB_WORKSPACE/npm/linux-arm64"
          NODE_PATH="$smoke_dir/node_modules" node bin/landstrip.js --version
  extensions:
    name: Test extensions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/*/package-lock.json

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm run ci:extensions:local
